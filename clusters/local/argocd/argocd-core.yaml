apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-core
  namespace: argocd
spec:
  project: default
  source:
    # Source 1: Official Helm Chart
    - repoURL: https://argoproj.github.io/argo-helm
      chart: argo-cd
      targetRevision: 9.4.10
      helm:
        valueFiles:
          - $values/clusters/local/argocd/values.yaml # You'll need to create this file
    # Source 2: Your Repo
    - repoURL: https://github.com/bamcmanus/gitops
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
