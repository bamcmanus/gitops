apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-ingress
  namespace: argocd
  annotations:
    # Explicitly tell k3d to use Traefik
    kubernetes.io/ingress.class: traefik
    # Traefik-specific entrypoint for k3d
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    # Tells Traefik to handle the TLS handshake
    traefik.ingress.kubernetes.io/router.tls: "true"
    # CRITICAL: This replaces the nginx backend-protocol annotation.
    # It tells Traefik the pod is NOT using TLS (because of the --insecure flag).
    traefik.ingress.kubernetes.io/service.serversscheme: http
spec:
  rules:
  - host: argocd.local  # <--- This must match your /etc/hosts entry
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: argocd-server
            port:
              number: 80
