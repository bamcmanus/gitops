apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-ingress
  namespace: argocd
  annotations:
    # Traefik-specific entrypoint for k3d
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    # Tells Traefik to handle the TLS handshake
    traefik.ingress.kubernetes.io/router.tls: "true"
    # Essential for Argo CD's API/GRPC to work over Ingress
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
spec:
  rules:
  - host: argocd.local  # <--- This must match your /etc/hosts entry
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: argocd-server
            port: 80
