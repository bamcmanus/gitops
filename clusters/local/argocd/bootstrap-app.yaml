apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/bamcmanus/gitops
    targetRevision: HEAD
    path: clusters/local/argocd
    directory:
      # This prevents the Root App from trying to "deploy" the config files
      exclude: '{values.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

